name: petfeeder
description: A smart pet feeder app

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2

  fl_chart: ^0.68.0
  # Firebase
  firebase_core: ^2.25.0
  firebase_auth: ^4.17.0
  firebase_database: ^10.4.0
  url_launcher: ^6.2.5
  cloud_firestore: ^4.13.0
  http: ^1.6.0
  image_picker: ^1.0.7

  lottie: ^3.1.0

  # UI
  google_fonts: ^6.1.0
  intl: ^0.19.0   # for date formatting (recommended)

  flutter_native_splash: ^2.4.0
  table_calendar: ^3.1.3
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^21.0.0
dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/dogs.jpg
    - assets/dog.png
    - assets/icon/app_icon.jpg
    - assets/icon/pawbite_logo.jpg
    - assets/animations/dog_walk.json